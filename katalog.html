<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Toko</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 40px; }
        h1 { text-align: center; color: #333; }
        .grid-produk { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 0; color: #2ecc71; }
        .harga { font-weight: bold; color: #e74c3c; font-size: 1.1em; }
        .deskripsi { color: #666; font-size: 0.9em; margin-top: 8px; }
    </style>
</head>
<body>

    <h1>Katalog Produk Kami 🛍️</h1>
    
    <!-- Tempat di mana daftar produk dari Supabase akan muncul -->
    <div id="container-produk" class="grid-produk">
        <p style="text-align: center; width: 100%;">Memuat produk...</p>
    </div>

    <!-- Menghubungkan ke SDK Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Menghubungkan ke file konfigurasi database kamu -->
    <script src="db.js"></script>
    <!-- Menghubungkan ke logika penampilan data -->
    <script src="katalog.js"></script>
</body>
</html>
