<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Admin - Input Produk</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .form-container { max-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #24b47e; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #1c8c62; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Tambah Produk Baru</h2>
        <form id="formProduk" onsubmit="event.preventDefault(); tambahProduk();">
            <div class="form-group">
                <label for="inputNamaProduk">Nama Produk:</label>
                <input type="text" id="inputNamaProduk" required placeholder="Contoh: Kemeja Flanel">
            </div>
            
            <div class="form-group">
                <label for="inputHargaProduk">Harga (Rp):</label>
                <input type="number" id="inputHargaProduk" required placeholder="Contoh: 150000">
            </div>
            
            <div class="form-group">
                <label for="inputDeskripsiProduk">Deskripsi:</label>
                <textarea id="inputDeskripsiProduk" rows="3" placeholder="Deskripsi produk..."></textarea>
            </div>
            
            <button type="submit">Simpan ke Supabase Cloud</button>
        </form>
    </div>

    <!-- Menghubungkan library dan logika file javascript -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="admin.js"></script>
</body>
</html>
