<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk - Nusantara Cuy</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B4513;
      --secondary: #D2691E;
      --success: #2e7d32;
      --danger: #c62828;
      --warning: #f57c00;
      --bg: #f9f6f0;
      --white: #ffffff;
      --text: #2c1e15;
      --sidebar-width: 260px;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 25px; transition: all 0.3s ease; }
    
    /* HEADER UTAMA DENGAN TOMBOL HAMBURGER GARIS 3 */
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e3dec3; padding-bottom: 15px; gap: 15px; }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .nav-header h2 { color: var(--primary); font-weight: 700; font-size: 1.4rem; }
    .btn-logout { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
    
    /* TOMBOL HAMBURGER INTERAKTIF (GARIS 3) */
    .hamburger-menu {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 26px;
      height: 18px;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 1001;
    }
    .hamburger-menu span {
      width: 100%;
      height: 3px;
      background-color: var(--primary);
      border-radius: 2px;
      transition: all 0.3s linear;
    }

    /* SIDEBAR / PANEL MENU SLIDE OVERLAY KIRI */
    .sidebar-panel {
      position: fixed;
      top: 0;
      left: -260px; /* Sembunyi di luar layar kiri awal */
      width: var(--sidebar-width);
      height: 100%;
      background: #efe9db;
      border-right: 3px solid #e3dec3;
      box-shadow: 4px 0 15px rgba(0,0,0,0.1);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      padding: 25px 20px;
      transition: left 0.3s ease-in-out;
    }
    .sidebar-panel.active {
      left: 0; /* Geser keluar saat aktif */
    }
    .sidebar-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 25px;
      padding-bottom: 10px;
      border-bottom: 2px solid #dcd5c5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-close-sidebar {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      color: var(--danger);
      cursor: pointer;
      font-weight: bold;
    }
    
    /* STYLE LINK MENU DI DALAM SIDEBAR */
    .sidebar-links { display: flex; flex-direction: column; gap: 12px; list-style: none; }
    .nav-link { 
      padding: 12px 18px; 
      background: var(--white); 
      color: var(--text); 
      border: 1px solid #dcd5c5; 
      border-radius: 6px; 
      font-weight: 600; 
      font-size: 0.95rem; 
      text-decoration: none; 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      transition: all 0.2s ease; 
    }
    .nav-link:hover { background: #faf8f5; border-color: var(--secondary); color: var(--secondary); padding-left: 22px; }
    .nav-link.active { background: var(--primary); color: var(--white); border-color: var(--primary); }

    /* LAYER BACKGROUND REDUP SEMENTARA */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 999;
      display: none;
    }
    .sidebar-overlay.active {
      display: block;
    }

    /* STYLE ELEMEN HALAMAN KATALOG PRODUK */
    .section-title { font-size: 1.1rem; color: var(--primary); margin: 25px 0 15px 0; font-weight: 700; border-left: 4px solid var(--secondary); padding-left: 10px; }
    .grid-container { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
    @media (max-width: 992px) { .grid-container { grid-template-columns: 1fr; } }
    
    .panel-box { background: var(--white); border: 1px solid #e3dec3; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.01); margin-bottom: 25px; }
    .panel-box h3 { font-size: 1.1rem; color: var(--primary); margin-bottom: 15px; font-weight: 700; border-bottom: 2px solid #efe9db; padding-bottom: 8px; }
    
    /* FORM INPUT STYLE */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #5c4d41; margin-bottom: 5px; }
    .form-control { width: 100%; padding: 10px; border: 1px solid #dcd5c5; border-radius: 6px; font-size: 0.9rem; background: #faf9f5; }
    .form-control:focus { outline: none; border-color: var(--secondary); background: var(--white); }
    
    .btn-block { display: block; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 700; font-size: 0.95rem; cursor: pointer; text-align: center; }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:hover { background: #6f340d; }
    
    /* TABLE STYLING */
    .table-responsive { width: 100%; overflow-x: auto; border: 1px solid #e3dec3; border-radius: 8px; background: var(--white); }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    th { background: #efe9db; color: var(--primary); font-weight: 700; padding: 12px 15px; border-bottom: 2px solid #e3dec3; }
    td { padding: 12px 15px; border-bottom: 1px solid #efe9db; color: var(--text); }
    tr:hover { background: #faf9f5; }
    
    .btn-action { padding: 4px 10px; border: none; border-radius: 4px; font-size: 0.8rem; cursor: pointer; font-weight: 600; margin-right: 5px; transition: opacity 0.2s; }
    .btn-action:hover { opacity: 0.85; }
    .btn-edit { background: #e3f2fd; color: #0d47a1; }
    .btn-delete { background: #ffebee; color: var(--danger); }
  </style>
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebarMenu()"></div>

  <div class="sidebar-panel" id="sidebarMenuPanel">
    <div class="sidebar-title">
      <span>Nusantara Cuy Menu</span>
      <button class="btn-close-sidebar" onclick="toggleSidebarMenu()">✕</button>
    </div>
    <ul class="sidebar-links">
      <li><a href="dashboard.html" class="nav-link">📊 Panel Utama</a></li>
      <li><a href="produk.html" class="nav-link active">📋 Katalog Produk</a></li>
      <li><a href="penjualan.html" class="nav-link">🛒 Laporan Penjualan</a></li>
      <li><a href="keuangan.html" class="nav-link">🏦 Laporan Keuangan</a></li>
    </ul>
  </div>

  <header class="nav-header">
    <div class="header-left">
      <button class="hamburger-menu" onclick="toggleSidebarMenu()" title="Buka Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <h2>Katalog Produk - Nusantara Cuy</h2>
    </div>
    <button class="btn-logout" onclick="logoutAdmin()">🚪 Keluar</button>
  </header>

  <div class="grid-container">
    
    <div>
      <div class="section-title">🍹 Menu Minuman & Varian Terdaftar</div>
      <div class="panel-box">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Nama Produk</th>
                <th>Harga Jual</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tabelProduk">
              <tr><td colspan="3" style="text-align:center; color:#888;">Memuat data produk...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">➕ Tambah Menu Produk Baru</div>
      <div class="panel-box">
        <form id="formTambahProduk" onsubmit="simpanProdukBaru(event)">
          <div class="form-group">
            <label>Nama Produk / Minuman</label>
            <input type="text" id="inputNamaProduk" class="form-control" placeholder="Contoh: Cendol Sultan Kopi" required>
          </div>
          <div class="form-group">
            <label>Harga Jual (Rp)</label>
            <input type="number" id="inputHargaProduk" class="form-control" placeholder="Contoh: 15000" required>
          </div>
          <button type="submit" class="btn-block btn-primary">💾 Simpan Produk</button>
        </form>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    // Variabel penampung status mode edit produk
    let idProdukYangDiedit = null;

    // CONTROL ANIMASI PANEL SIDEBAR GARIS 3
    function toggleSidebarMenu() {
      const panel = document.getElementById('sidebarMenuPanel');
      const overlay = document.getElementById('sidebarOverlay');
      panel.classList.toggle('active');
      overlay.classList.toggle('active');
    }

    document.addEventListener("DOMContentLoaded", () => {
      proteksiHalamanDashboard(); // Pastikan sudah login admin
      muatTabelProduk();
    });

    // LOAD DATA PRODUK DARI SUPABASE
    async function muatTabelProduk() {
      try {
        const { data, error } = await supabaseClient.from('produk').select('*').order('nama_produk', { ascending: true });
        const tbody = document.getElementById('tabelProduk');
        if (error) throw error;
        
        if (!data || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">Belum ada menu produk terdaftar.</td></tr>`;
          return;
        }

        tbody.innerHTML = data.map(p => `
          <tr>
            <td style="font-weight:600;">${p.nama_produk}</td>
            <td style="font-weight:600; color:var(--secondary)">Rp ${(p.harga || 0).toLocaleString('id-ID')}</td>
            <td>
              <button class="btn-action btn-edit" onclick="alirkanKeFormEdit(${p.id}, '${p.nama_produk}', ${p.harga || 0})">Edit</button>
              <button class="btn-action btn-delete" onclick="hapusProduk(${p.id})">Hapus</button>
            </td>
          </tr>
        `).join('');
      } catch (err) { console.error("Gagal load produk:", err.message); }
    }

    // OPER DATA KE FORM TAMBAH MENU PRODUK BARU
    function alirkanKeFormEdit(id, namaLama, hargaLama) {
      idProdukYangDiedit = id; // Mengunci ID produk lama yang mau diganti
      document.getElementById('inputNamaProduk').value = namaLama;
      document.getElementById('inputHargaProduk').value = hargaLama;
      
      // Gulir & fokus layar otomatis ke input nama produk
      document.getElementById('inputNamaProduk').focus();
      
      // Ganti tulisan tombol simpan agar memberi tanda sedang dalam mode edit
      document.querySelector('#formTambahProduk button[type="submit"]').innerHTML = "💾 Perbarui & Simpan Produk";
    }

    // LOGIKA SIMPAN BARU ATAU EDIT TIMPA PRODUK LAMA (MURNI TANPA COLUMN KATEGORI)
    async function simpanProdukBaru(e) {
      e.preventDefault();
      const nama = document.getElementById('inputNamaProduk').value;
      const harga = document.getElementById('inputHargaProduk').value;

      try {
        // 1. TAMBAH SEBAGAI PRODUK BARU TERLEBIH DAHULU (INSERT BARU)
        // Murni hanya mengirim data nama_produk dan harga tanpa kolom kategori
        const { error: insertError } = await supabaseClient
          .from('produk')
          .insert([{ 
            nama_produk: nama, 
            harga: Number(harga)
          }]);
        
        if (insertError) throw insertError;

        // 2. JIKA SEBELUMNYA MENGKLIK TOMBOL EDIT, LAKUKAN PROSES HAPUS PRODUK LAMA
        if (idProdukYangDiedit !== null) {
          try {
            const { error: deleteError } = await supabaseClient
              .from('produk')
              .delete()
              .eq('id', idProdukYangDiedit);
            
            if (deleteError) {
              // Jika gagal karena ID produk mengikat di penjualan (Foreign Key Error),
              // sistem membiarkan produk lama tetap ada di database demi menjaga histori penjualan Anda.
              console.warn("Produk lama dibiarkan tetap ada karena memiliki riwayat penjualan aktif.");
            }
          } catch (delErr) {
            console.warn("Proses hapus dilewati otomatis untuk mengamankan data penjualan.");
          }
        }
        
        // Kembalikan kondisi form ke mode normal semula
        document.getElementById('formTambahProduk').reset();
        document.querySelector('#formTambahProduk button[type="submit"]').innerHTML = "💾 Simpan Produk";
        
        alert(idProdukYangDiedit !== null ? 'Data produk berhasil diperbarui!' : 'Produk baru berhasil ditambahkan!');
        
        idProdukYangDiedit = null; // Reset status ID edit menjadi kosong kembali
        muatTabelProduk(); // Refresh data tabel produk terdaftar
      } catch (err) { 
        alert('Gagal memproses perubahan produk: ' + err.message); 
      }
    }

    // HAPUS MANUAL VIA TOMBOL HAPUS
    async function hapusProduk(id) {
      if (!confirm("Apakah Anda yakin ingin menghapus produk ini dari katalog?")) return;
      try {
        const { error } = await supabaseClient.from('produk').delete().eq('id', id);
        if (error) {
          alert("Gagal menghapus! Produk ini sudah masuk ke dalam data riwayat penjualan aktif toko Anda.");
          return;
        }
        muatTabelProduk();
      } catch (err) { 
        alert('Gagal menghapus produk: ' + err.message); 
      }
    }
  </script>
</body>
</html>
