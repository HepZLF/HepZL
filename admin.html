<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Nusantara Cuy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Dashboard Admin</h1>
        <p>Manajemen Produk Nusantara Cuy</p>
    </header>

    <main class="container">
        <div class="form-box">
            <h2>Tambah Produk Baru</h2>
            <form id="form-produk" onsubmit="event.preventDefault(); tambahProduk();">
                <div class="form-group">
                    <label for="nama_produk">Nama Produk</label>
                    <input type="text" id="nama_produk" placeholder="Contoh: Kain Batik Tulis Solo" required>
                </div>
                <div class="form-group">
                    <label for="harga">Harga (Rp)</label>
                    <input type="number" id="harga" placeholder="Contoh: 250000" required>
                </div>
                <div class="form-group">
                    <label for="deskripsi">Deskripsi Produk</label>
                    <textarea id="deskripsi" rows="4" placeholder="Jelaskan keunggulan produk ini..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Simpan ke Cloud Supabase</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="admin.js"></script>
</body>
</html>
