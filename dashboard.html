<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Internal - Nusantara Cuy</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f6f9; display: flex; flex-direction: column; }
        .sidebar { width: 100%; background: #5d4037; color: white; padding: 15px; box-sizing: border-box; }
        .sidebar h2 { text-align: center; font-size: 1.2em; margin: 0 0 10px 0; border-bottom: 2px solid #8d6e63; padding-bottom: 10px; }
        .sidebar menu { list-style: none; padding: 0; margin: 0; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .sidebar menu li { padding: 10px; cursor: pointer; border-radius: 6px; background: #8d6e63; text-align: center; font-weight: bold; font-size: 0.85em; flex: 1; min-width: 120px; }
        .main-content { padding: 20px; width: 100%; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 6px; color: #5d4037; }
        .form-group input, .form-group textarea, .form-group select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; width: 100%; box-sizing: border-box; }
        button { background: #ff6e40; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #8d6e63; color: white; }
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .sidebar { width: 250px; height: 100vh; position: fixed; }
            .sidebar menu { flex-direction: column; }
            .main-content { margin-left: 250px; width: calc(100% - 250px); padding: 40px; }
            .form-grid { grid-template-columns: 1fr 1fr; }
            button { width: auto; padding: 12px 30px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard Admin</h2>
        <menu>
            <li onclick="location.href='#section-produk'">📦 Perbarui Harga & Foto</li>
            <li onclick="location.href='#section-penjualan'">💰 Pencatatan Penjualan</li>
            <li onclick="prosesLogout()" style="background: #c62828;">🚪 Logout</li>
        </menu>
    </div>

    <div class="main-content">
        <div id="section-produk" class="card">
            <h2>Manajemen Katalog Produk (Ubah Harga / Foto)</h2>
            <form id="form-produk" onsubmit="event.preventDefault(); tambahAtauUpdateProduk();">
                <input type="hidden" id="edit-id-produk">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nama Produk</label>
                        <input type="text" id="nama_produk" readonly placeholder="Klik tombol Edit di tabel bawah..." style="background: #eee;">
                    </div>
                    <div class="form-group">
                        <label>Harga Baru (Rp)</label>
                        <input type="number" id="harga" required placeholder="Contoh: 18000">
                    </div>
                    <div class="form-group" style="grid-column: span 1;">
                        <label>URL Tautan Foto Produk</label>
                        <input type="text" id="foto_url" placeholder="Paste link tautan gambar produk...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="deskripsi" rows="2" readonly style="background: #eee;"></textarea>
                </div>
                <button type="submit" id="btn-simpan-produk">Simpan Perubahan Data</button>
            </form>

            <h3>Daftar 3 Produk Fiks</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Produk</th>
                            <th>Harga</th>
                            <th>Foto URL</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-produk">
                        <tr><td colspan="4" style="text-align:center;">Memeriksa database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="section-penjualan" class="card">
            <h2>Pencatatan Data Penjualan</h2>
            <form id="form-penjualan" onsubmit="event.preventDefault(); simpanPenjualan();">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Produk Terjual</label>
                        <select id="pilih_produk" required>
                            <option value="">-- Memuat Produk --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Jumlah (Kuantitas)</label>
                        <input type="number" id="jumlah_terjual" required min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label>Nama Pelanggan / Pembeli</label>
                        <input type="text" id="nama_pembeli" required placeholder="Nama pembeli...">
                    </div>
                    <div class="form-group">
                        <label>Tanggal Transaksi</label>
                        <input type="date" id="tanggal_penjualan" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Alamat Pengiriman / Pembeli</label>
                    <textarea id="alamat_pembeli" rows="2" required placeholder="Alamat lengkap pembeli..."></textarea>
                </div>
                <button type="submit">Catat Transaksi Penjualan</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script src="admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof proteksiHalamanAdmin === 'function') { proteksiHalamanAdmin(); }
            setTimeout(() => { if(typeof memuatDasborAwal === 'function') { memuatDasborAwal(); } }, 200);
        });
    </script>
</body>
</html>
